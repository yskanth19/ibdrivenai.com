<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // Clean URL redirect: /privacy → /privacy.html etc.
    const path = window.location.pathname;
    const clean = path.replace(/\/$/, '');
    const pages = ['/privacy', '/about', '/contact'];
    if (pages.includes(clean)) {
      window.location.replace(clean + '.html');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
